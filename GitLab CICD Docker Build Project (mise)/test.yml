stages:
  - test
  - build
  - scan
  - push
  - deploy

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  PYTHON_IMAGE: $CI_REGISTRY_IMAGE/python-api
  NODE_IMAGE: $CI_REGISTRY_IMAGE/node-api

# Test stage - run before building
test-python:
  stage: test
  image: python:3.12-slim
  script:
    - cd python-api
    - pip install -r requirements.txt
    - python -m pytest --tb=short || true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"

test-node:
  stage: test
  image: node:20-alpine
  script:
    - cd node-api
    - npm ci
    - npm test || true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"

# Build stage
build-python:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $PYTHON_IMAGE:$CI_COMMIT_SHA -t $PYTHON_IMAGE:latest ./python-api
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build-node:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $NODE_IMAGE:$CI_COMMIT_SHA -t $NODE_IMAGE:latest ./node-api
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Scan stage - vulnerability scanning
scan-python:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL $PYTHON_IMAGE:$CI_COMMIT_SHA
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

scan-node:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL $NODE_IMAGE:$CI_COMMIT_SHA
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Push stage
push-python:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $PYTHON_IMAGE:$CI_COMMIT_SHA
    - docker push $PYTHON_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

push-node:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $NODE_IMAGE:$CI_COMMIT_SHA
    - docker push $NODE_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Deploy stage - placeholder (customize for your environment)
deploy-staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to staging..."
    - kubectl set image deployment/python-api python-api=$PYTHON_IMAGE:$CI_COMMIT_SHA || true
    - kubectl set image deployment/node-api node-api=$NODE_IMAGE:$CI_COMMIT_SHA || true
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-production:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to production..."
    - kubectl set image deployment/python-api python-api=$PYTHON_IMAGE:$CI_COMMIT_SHA || true
    - kubectl set image deployment/node-api node-api=$NODE_IMAGE:$CI_COMMIT_SHA || true
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

 