image: docker:24

services:
  - docker:24-dind

variables:
  IMAGE_NAME: sample-npm-build

stages:
  - build

build_image:
  stage: build
  before_script:
    - apk add --no-cache bash curl
    - curl -fsSL https://mise.run | sh
    - export PATH="${HOME}/.local/bin:${PATH}"
  script:
    - mise run ir_wrapped
